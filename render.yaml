services:
  - type: web
    name: plant-disease-detector-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip ; pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_PATH
        value: model.tflite
      - key: LABELS_PATH
        value: labels.txt
      - key: CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: ALLOWED_ORIGINS
        sync: false
